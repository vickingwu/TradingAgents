name: TradingAgents Analysis

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: 'Stock ticker (e.g. NVDA, AAPL, TSLA)'
        required: true
        default: 'NVDA'
      analysis_date:
        description: 'Analysis date (YYYY-MM-DD, leave empty for today)'
        required: false
        default: ''
      llm_provider:
        description: 'LLM Provider'
        required: true
        default: 'openai'
        type: choice
        options:
          - openai
          - anthropic
          - google
          - deepseek
      deep_think_llm:
        description: 'Deep thinking model name'
        required: true
        default: 'gpt-5.4-mini'
      quick_think_llm:
        description: 'Quick thinking model name'
        required: true
        default: 'gpt-5.4-mini'

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt python-dotenv

      - name: Run TradingAgents Analysis
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TICKER: ${{ github.event.inputs.ticker }}
          ANALYSIS_DATE: ${{ github.event.inputs.analysis_date }}
          LLM_PROVIDER: ${{ github.event.inputs.llm_provider }}
          DEEP_THINK_LLM: ${{ github.event.inputs.deep_think_llm }}
          QUICK_THINK_LLM: ${{ github.event.inputs.quick_think_llm }}
        run: python run_ci.py 2>&1 | tee analysis_report.txt

      - name: Send email report
        if: always()
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVERS: ${{ secrets.EMAIL_RECEIVERS }}
          TICKER: ${{ github.event.inputs.ticker }}
          ANALYSIS_DATE: ${{ github.event.inputs.analysis_date }}
          LLM_PROVIDER: ${{ github.event.inputs.llm_provider }}
          DEEP_THINK_LLM: ${{ github.event.inputs.deep_think_llm }}
          QUICK_THINK_LLM: ${{ github.event.inputs.quick_think_llm }}
          RUN_ID: ${{ github.run_id }}
        run: |
          python3 - <<'PYEOF'
          import smtplib, ssl, os
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText
          from email.mime.base import MIMEBase
          from email import encoders

          sender = os.environ.get("EMAIL_SENDER", "")
          password = os.environ.get("EMAIL_PASSWORD", "")
          receivers = os.environ.get("EMAIL_RECEIVERS", sender)
          if not sender or not password:
              print("⚠️ EMAIL_SENDER or EMAIL_PASSWORD not set, skipping email.")
              exit(0)

          receiver_list = [r.strip() for r in receivers.split(",") if r.strip()]
          ticker = os.environ.get("TICKER", "")
          analysis_date = os.environ.get("ANALYSIS_DATE", "")
          provider = os.environ.get("LLM_PROVIDER", "")
          deep_llm = os.environ.get("DEEP_THINK_LLM", "")
          quick_llm = os.environ.get("QUICK_THINK_LLM", "")
          run_id = os.environ.get("RUN_ID", "")

          msg = MIMEMultipart()
          msg["From"] = sender
          msg["To"] = ", ".join(receiver_list)
          msg["Subject"] = f"TradingAgents Report - {ticker} - {run_id}"

          body = f"TradingAgents Analysis Report\n==============================\nTicker: {ticker}\nDate: {analysis_date}\nProvider: {provider}\nModels: {deep_llm} / {quick_llm}\nRun ID: {run_id}\n\nSee attached file for full report."
          msg.attach(MIMEText(body, "plain", "utf-8"))

          report_path = "analysis_report.txt"
          if os.path.exists(report_path):
              with open(report_path, "rb") as f:
                  part = MIMEBase("application", "octet-stream")
                  part.set_payload(f.read())
                  encoders.encode_base64(part)
                  part.add_header("Content-Disposition", f"attachment; filename={report_path}")
                  msg.attach(part)
          else:
              print("⚠️ analysis_report.txt not found, sending without attachment.")

          context = ssl.create_default_context()
          print(f"Connecting to smtp.qq.com:465 ...")
          with smtplib.SMTP_SSL("smtp.qq.com", 465, context=context, timeout=60) as server:
              print("Connected, logging in ...")
              server.login(sender, password)
              print("Logged in, sending ...")
              server.sendmail(sender, receiver_list, msg.as_string())
              print("✅ Email sent successfully!")
          PYEOF

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: analysis-report
          path: analysis_report.txt
